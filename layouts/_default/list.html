{{ define "main" }}

<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </div>
</div>

<section>
  <div class="container">
    <div class="blog-list">
      {{ range .Pages }}
      <article class="blog-card">
        <div class="blog-card-body">
          <div class="blog-meta">
            <span>{{ .Date.Format "2 Jan 2006" }}</span>
            {{ with .Params.author }}<span>{{ . }}</span>{{ end }}
          </div>
          <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
          <p>{{ .Summary | truncate 120 }}</p>
          <a href="{{ .Permalink }}" class="read-more">Lire l'article →</a>
        </div>
      </article>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}

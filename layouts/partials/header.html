<header class="site-header">
  <div class="container">
    <nav class="nav-inner">
      <a href="{{ "/" | relURL }}" class="site-logo">Attirer des Clients</a>
      <button class="nav-toggle" aria-label="Menu" onclick="this.nextElementSibling.classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
        </li>
        {{ end }}
        <li><a href="{{ "/contact-us/" | relURL }}" class="nav-cta">Prendre RDV</a></li>
      </ul>
    </nav>
  </div>
</header>

{{ define "main" }}

<div class="page-header">
  <div class="container">
    <h1>On cale une visio ?</h1>
    <p>Nous serions heureux de te rencontrer</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="contact-grid">
      <div class="contact-info">
        <h2 class="section-title">Nos coordonnées</h2>
        <div class="contact-item">
          <div class="contact-icon">✉️</div>
          <div>
            <h3>Email</h3>
            <a href="mailto:contact@attirerdesclients.re">contact@attirerdesclients.re</a>
          </div>
        </div>
        <div style="margin-top:16px;">
          <a href="{{ "/equipe/" | relURL }}" class="btn btn-outline">A propos de nous</a>
        </div>
      </div>

      <div class="contact-cta-box">
        <h2>Envoie-nous un message</h2>
        <p>On te répond dans les 24h pour caler un échange.</p>

        <form action="https://formsubmit.co/77e0b3010d42db28b34f5eaa4111d06a" method="POST" class="contact-form">
          <!-- FormSubmit config -->
          <input type="hidden" name="_subject" value="Nouveau message — Attirer des Clients">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="{{ "/contact-us/merci/" | absURL }}">
          <input type="text" name="_honey" style="display:none">

          <div class="form-group">
            <label for="name">Prénom *</label>
            <input type="text" id="name" name="name" placeholder="Ton prénom" required>
          </div>
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="ton@email.com" required>
          </div>
          <div class="form-group">
            <label for="message">Ton activité et ce que tu cherches</label>
            <textarea id="message" name="message" rows="4" placeholder="Dis-nous en quelques mots ce que tu fais et ce qui te bloque..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Envoyer le message</button>
        </form>
      </div>
    </div>
  </div>
</section>

{{ end }}
